name: Windows Installer
on:
  workflow_dispatch:
  push:
    branches: [ master, windows-install ]
  pull_request:

jobs:
  build-installer:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [installer, tests]
    steps:
      - name: Allow Windows reserved filenames
        run: git config --system core.protectNTFS false
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install dependencies
        run: choco install -y cmake --version=3.28.6 `
          --no-progress `
          --installargs '"ADD_CMAKE_TO_PATH=System"' `
          --allow-downgrade   # harmless if no newer CMake is present
      - name: Install NSIS
        run: choco install -y nsis --no-progress
      - name: Add NSIS to PATH
        shell: pwsh
        run: |
          $nsis = "${env:ProgramFiles(x86)}\NSIS"
          if (-not (Test-Path $nsis)) {
            Write-Error "NSIS not found at $nsis after installation"
          }
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build zlib
        shell: pwsh
        run: |
          $ver = '1.3.1'
          $zip = "$env:RUNNER_TEMP\zlib.zip"
          $zlibArchive = "zlib$($ver -replace '\.', '').zip"
          $urls = @(
            "https://zlib.net/$zlibArchive",
            "https://github.com/madler/zlib/releases/download/v$ver/$zlibArchive",
            "https://github.com/madler/zlib/archive/refs/tags/v$ver.zip"
          )
          $downloaded = $false
          foreach ($url in $urls) {
            try {
              Invoke-WebRequest $url -OutFile $zip
              $downloaded = $true
              break
            } catch {
              Write-Host "Failed to download zlib from $url"
            }
          }
          if (-not $downloaded) {
            throw "Could not download zlib archive from any known source"
          }
          Expand-Archive $zip -DestinationPath $env:RUNNER_TEMP
          $src = Join-Path $env:RUNNER_TEMP "zlib-$ver"
          $bld = Join-Path $src "build"
          cmake -S "$src" -B "$bld" -G "NMake Makefiles" -DCMAKE_INSTALL_PREFIX="$bld\install" -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
          Push-Location $bld
          nmake install
          Pop-Location
          $zlibDir = Join-Path $bld "install"
          $inc = Join-Path $zlibDir "include"
          $libDir = Join-Path $zlibDir "lib"
          $static = Join-Path $libDir "zlibstatic.lib"
          $lib = Join-Path $libDir "zlib.lib"
          Copy-Item $static $lib -Force
          "CMAKE_PREFIX_PATH=$zlibDir;$env:CMAKE_PREFIX_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_INCLUDE_PATH=$inc;$env:CMAKE_INCLUDE_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_LIBRARY_PATH=$libDir;$env:CMAKE_LIBRARY_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZLIB_LIBRARY=$lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZLIB_INCLUDE_DIR=$inc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZLIB_LIBRARY_DIR=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$zlibDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install Eigen
        shell: pwsh
        run: |
          $ver = '3.4.0'
          $zip = "$env:RUNNER_TEMP\eigen.zip"
          Invoke-WebRequest "https://gitlab.com/libeigen/eigen/-/archive/$ver/eigen-$ver.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $env:RUNNER_TEMP
          $dir = Join-Path $env:RUNNER_TEMP "eigen-$ver"
          "EIGEN3_INCLUDE_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$dir;$env:CMAKE_PREFIX_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build libxml2
        shell: pwsh
        run: |
          $ver = '2.12.10'
          $zip = "$env:RUNNER_TEMP\libxml2.zip"
          Invoke-WebRequest "https://github.com/GNOME/libxml2/archive/refs/tags/v$ver.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $env:RUNNER_TEMP
          $src = Join-Path $env:RUNNER_TEMP "libxml2-$ver"
          $installDir = Join-Path $src 'install'
          $win32 = Join-Path $src 'win32'
          Push-Location $win32
          cscript configure.js compiler=msvc prefix=$installDir iconv=no zlib=yes include=$env:ZLIB_INCLUDE_DIR lib=$env:ZLIB_LIBRARY_DIR
          (Get-Content Makefile.msvc).Replace('/OPT:NOWIN98','').Replace('zdll.lib','zlib.lib') | Set-Content Makefile.msvc
          $conf = Join-Path $src 'config.h'
          if (Test-Path $conf) {
            (Get-Content $conf) -replace '^#define snprintf.*', '// removed snprintf define' -replace '^#define vsnprintf.*', '// removed vsnprintf define' | Set-Content $conf
          }
          nmake /f Makefile.msvc
          nmake /f Makefile.msvc install
          Pop-Location
          Write-Host "libxml2 library path after install:" $installDir
          $inc = Join-Path $installDir 'include'
          $lib = Join-Path $installDir 'lib' 'libxml2.lib'
          $bin = Join-Path $installDir 'bin'
          "CMAKE_PREFIX_PATH=$installDir;$env:CMAKE_PREFIX_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBXML2_LIBRARY=$lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBXML2_LIBRARIES=$lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBXML2_INCLUDE_DIR=$inc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBXML2_BIN_DIR=$bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install aqtinstall
          $qtDir = "C:\\Qt"
          python -m aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 -O $qtDir -m qtcharts qtscript
          $qt = "$qtDir\5.15.2\msvc2019_64"
          "Qt5_DIR=$qt" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$qt;$env:CMAKE_PREFIX_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$qt\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build GLEW
        shell: pwsh
        run: |
          $ver = '2.2.0'
          $zip = "$env:RUNNER_TEMP\glew.zip"
          Invoke-WebRequest "https://github.com/nigels-com/glew/releases/download/glew-$ver/glew-$ver.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $env:RUNNER_TEMP
          $glewDir = Join-Path $env:RUNNER_TEMP "glew-$ver"
          $buildDir = Join-Path $glewDir 'builddir'
          cmake -S (Join-Path $glewDir 'build' 'cmake') -B $buildDir -G "NMake Makefiles" -DBUILD_SHARED_LIBS=ON -DBUILD_UTILS=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$buildDir\install"
          cmake --build $buildDir --config Release --target install
          $installDir = Join-Path $buildDir 'install'
          $binDir = Join-Path $installDir 'bin'
          $libDir = Join-Path $installDir 'lib'
          $inc = Join-Path $installDir 'include'
          "GLEW_BIN_DIR=$binDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GLEW_INCLUDE_DIR=$inc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GLEW_LIBRARY=$(Join-Path $libDir 'glew32.lib')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_INCLUDE_PATH=$inc;$env:CMAKE_INCLUDE_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_LIBRARY_PATH=$libDir;$env:CMAKE_LIBRARY_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$installDir;$env:CMAKE_PREFIX_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Configure
        shell: pwsh
        env:
          ENABLE_TESTS: ${{ matrix.target == 'tests' && 'ON' || 'OFF' }}
        run: |
          $dist = Join-Path $pwd 'scripts/installer/dist'
          cmake -S . -B build `
            -G "NMake Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_VERBOSE_MAKEFILE=ON `
            "-DENABLE_TESTS=$env:ENABLE_TESTS" `
            -DENABLE_OPENMP=ON `
            -DCMAKE_INSTALL_PREFIX="$dist" `
            -DENABLE_AVO_PACKAGE=ON `
            -DENABLE_GLSL=ON `
            "-DEIGEN3_INCLUDE_DIR=$env:EIGEN3_INCLUDE_DIR" `
            "-DLIBXML2_LIBRARY=$env:LIBXML2_LIBRARY" `
            "-DLIBXML2_INCLUDE_DIR=$env:LIBXML2_INCLUDE_DIR" `
            "-DGLEW_INCLUDE_DIR=$env:GLEW_INCLUDE_DIR" `
            "-DGLEW_LIBRARY=$env:GLEW_LIBRARY"
      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --target openbabel_ext-install
          cmake --build build --config Release --target install
      - name: Create installer
        if: matrix.target == 'installer'
        shell: pwsh
        run: |
          $env:OPENBABEL_INSTALL_DIR = "$PWD\build\openbabel-install"
          python scripts/installer/create_installer.py
      - name: Test
        if: matrix.target == 'tests'
        shell: pwsh
        run: |
          $obInstall = Join-Path $PWD 'build/openbabel-install'
          $obBin = Join-Path $obInstall 'bin'
          $obShareRoot = Join-Path $obInstall 'share/openbabel'
          $obLibRoot = Join-Path $obInstall 'lib/openbabel'

          $obDataDir = $obInstall
          if (Test-Path $obShareRoot) {
            $versionedShare = Get-ChildItem $obShareRoot -Directory | Select-Object -First 1
            if ($versionedShare) {
              $obDataDir = $versionedShare.FullName
            }
          }

          $obPluginDir = $null
          if (Test-Path $obLibRoot) {
            $versionedPlugin = Get-ChildItem $obLibRoot -Directory | Select-Object -First 1
            if ($versionedPlugin) {
              $obPluginDir = $versionedPlugin.FullName
            }
          }

          # Windows Open Babel installs may place plugins under bin instead of lib/openbabel/<version>.
          if (-not $obPluginDir) {
            $binPluginDir = Join-Path $obBin 'openbabel'
            if (Test-Path $binPluginDir) {
              $versionedBinPlugin = Get-ChildItem $binPluginDir -Directory | Select-Object -First 1
              if ($versionedBinPlugin) {
                $obPluginDir = $versionedBinPlugin.FullName
              }
            }
          }
          if (-not $obPluginDir) {
            $obPluginDir = $obBin
          }

          $env:BABEL_DATADIR = $obDataDir
          $env:BABEL_LIBDIR = $obPluginDir
          $env:PATH = "$obPluginDir;$obBin;$env:PATH"

          Write-Host "Using BABEL_DATADIR=$env:BABEL_DATADIR"
          Write-Host "Using BABEL_LIBDIR=$env:BABEL_LIBDIR"
          Write-Host "Open Babel install tree (top-level):"
          Get-ChildItem $obInstall | Select-Object Name, Mode

          if ($env:LIBXML2_BIN_DIR) {
            $xmlDll = Join-Path $env:LIBXML2_BIN_DIR 'libxml2.dll'
            Write-Host "libxml2.dll exists=$((Test-Path $xmlDll)) at $xmlDll"
          }

          ctest --test-dir build -C Release --output-on-failure
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ctest failed; collecting detailed logs for moleculefileTest"

            $lastTestLog = Join-Path $PWD 'build/Testing/Temporary/LastTest.log'
            if (Test-Path $lastTestLog) {
              Write-Host "===== LastTest.log ====="
              Get-Content $lastTestLog
            }

            $moleculeTest = Join-Path $PWD 'build/bin/moleculefiletest.exe'
            if (-not (Test-Path $moleculeTest)) {
              $moleculeTest = Join-Path $PWD 'build/bin/Release/moleculefiletest.exe'
            }

            if (Test-Path $moleculeTest) {
              Write-Host "===== Direct moleculefileTest output (-o -,txt) ====="
              $directTxt = Join-Path $PWD 'build/moleculefiletest-direct.txt'
              & $moleculeTest -o -,txt -o $directTxt,txt 2>&1 | Out-String | Write-Host
              Write-Host "moleculefiletest -o -,txt exit code: $LASTEXITCODE"
              if (Test-Path $directTxt) {
                Write-Host "===== moleculefileTest direct txt file ====="
                Get-Content $directTxt
              }

              Write-Host "===== Direct moleculefileTest test list (-functions) ====="
              & $moleculeTest -functions 2>&1 | Out-String | Write-Host
              Write-Host "moleculefiletest -functions exit code: $LASTEXITCODE"

              $moleculeFunctions = @(
                'readWriteMolecule',
                'readFile',
                'readWriteConformers',
                'replaceMolecule',
                'appendMolecule'
              )
              foreach ($fn in $moleculeFunctions) {
                Write-Host "===== moleculefileTest function: $fn ====="
                $fnTxt = Join-Path $PWD ("build/moleculefiletest-{0}.txt" -f $fn)
                & $moleculeTest -o -,txt -o $fnTxt,txt $fn 2>&1 | Out-String | Write-Host
                Write-Host "moleculefiletest $fn exit code: $LASTEXITCODE"
                if (Test-Path $fnTxt) {
                  Write-Host "===== moleculefileTest $fn txt file ====="
                  Get-Content $fnTxt
                }
              }

              Write-Host "===== ctest verbose rerun for moleculefileTest ====="
              ctest --test-dir build -C Release -R moleculefileTest -V 2>&1 | Out-String | Write-Host

              $dumpbin = Get-Command dumpbin.exe -ErrorAction SilentlyContinue
              if ($dumpbin) {
                Write-Host "===== moleculefiletest dependencies (dumpbin /DEPENDENTS) ====="
                & dumpbin.exe /DEPENDENTS $moleculeTest 2>&1 | Out-String | Write-Host

                $openbabelDll = Join-Path $obBin 'openbabel-3.dll'
                if (Test-Path $openbabelDll) {
                  Write-Host "===== openbabel-3.dll dependencies (dumpbin /DEPENDENTS) ====="
                  & dumpbin.exe /DEPENDENTS $openbabelDll 2>&1 | Out-String | Write-Host
                }

                $pluginDll = Get-ChildItem $env:BABEL_LIBDIR -Filter 'plugin*.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
                if (-not $pluginDll) {
                  $pluginDll = Get-ChildItem $env:BABEL_LIBDIR -Filter 'format*.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
                }
                if ($pluginDll) {
                  Write-Host "===== $($pluginDll.Name) dependencies (dumpbin /DEPENDENTS) ====="
                  & dumpbin.exe /DEPENDENTS $pluginDll.FullName 2>&1 | Out-String | Write-Host
                }
              }

              foreach ($dllName in @('openbabel-3.dll', 'libxml2.dll', 'zlib.dll', 'Qt5Core.dll')) {
                Write-Host "===== where.exe $dllName ====="
                & where.exe $dllName 2>&1 | Out-String | Write-Host
                Write-Host "where.exe $dllName exit code: $LASTEXITCODE"
              }
            } else {
              Write-Host "moleculefiletest executable not found in build/bin or build/bin/Release"
            }

            Write-Host "===== Open Babel plugin dir listing ====="
            if (Test-Path $env:BABEL_LIBDIR) {
              Get-ChildItem $env:BABEL_LIBDIR | Select-Object -First 80 Name, Length, Mode
            } else {
              Write-Host "BABEL_LIBDIR path does not exist: $env:BABEL_LIBDIR"
            }

            exit 1
          }
      - name: Upload installer
        if: matrix.target == 'installer'
        uses: actions/upload-artifact@v4
        with:
          name: avogadro-windows-installer
          path: |
            scripts/installer/avogadro-win64-*.exe
          if-no-files-found: error
